<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --primary:#22c55e;
}

body.dark{
  --bg:#020617;
  --card:#0f172a;
  --text:#f8fafc;
}

body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:40px;
  transition:.4s;
}

.card{
  max-width:700px;
  margin:auto;
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
  animation:fadeUp .6s ease;
}

h2{color:#16a34a}

.slots{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:14px;
  margin-top:20px;
}

.slot{
  padding:12px;
  border-radius:10px;
  border:1px solid var(--primary);
  text-align:center;
  cursor:pointer;
}

.slot.booked{
  background:#e5e7eb;
  border-color:#9ca3af;
  cursor:not-allowed;
}

.slot.active{
  background:var(--primary);
  color:white;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:12px;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.toggle{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--card);
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙 Theme</div>

<div class="card">
  <h2>⚡ {{ station.name }}</h2>
  <p><strong>City:</strong> {{ station.city }}</p>
  <p><strong>Charger:</strong> {{ station.charger_type }}</p>

 <form method="POST">
  {% csrf_token %}

  <label>Select Date</label>
  <input type="date" name="date" required>

  <input type="hidden" name="time_slot" id="time_slot">

  <button type="submit">Confirm Booking</button>
</form>


</div>


<script>
function selectSlot(el){
  document.querySelectorAll(".slot").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("time_slot").value = el.innerText;
}
</script>


</body>
</html>
