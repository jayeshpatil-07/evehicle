<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | EV Charging</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#22c55e;
}

body.dark{
  --bg:#020617;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:40px;
  transition:.4s;
}

.toggle{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--card);
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.container{
  max-width:520px;
  margin:auto;
  background:var(--card);
  padding:30px;
  border-radius:22px;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
  animation:fadeUp .6s ease;
}

h2{
  color:#16a34a;
  margin-bottom:6px;
}

p{color:var(--muted);font-size:14px}

.amount{
  font-size:28px;
  font-weight:700;
  margin:20px 0;
}

.method{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
  cursor:pointer;
  transition:.3s;
}

.method:hover{
  border-color:var(--primary);
}

.method.active{
  border-color:var(--primary);
  background:#ecfdf5;
}

button{
  width:100%;
  margin-top:25px;
  padding:14px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:14px;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙 Theme</div>

<div class="container">
  <h2>Payment</h2>

<p><strong>Station:</strong> {{ booking.station.name }}</p>
<p><strong>Date:</strong> {{ booking.date }}</p>
<p><strong>Time:</strong> {{ booking.time_slot }}</p>
<p><strong>Amount:</strong> ₹200</p>

<form method="POST">
  {% csrf_token %}
  <button type="submit" class="btn">
    Pay & Confirm Booking
  </button>
</form>



<script>
function selectMethod(el){
  document.querySelectorAll(".method").forEach(m=>m.classList.remove("active"));
  el.classList.add("active");
}

function payNow(){
  alert("✅ Payment Successful!\nSlot Booked Successfully");
  window.location.href = "/profile/";   // change if needed
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
