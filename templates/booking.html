<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Charging Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#22c55e;
}

body.dark{
  --bg:#020617;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
  --primary:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:40px;
  transition:.4s;
}

.header{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.header h1{font-size:26px}

.toggle{
  background:var(--card);
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.container{
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
  transition:.4s;
  animation:fadeUp .6s ease;
}

.card:hover{
  transform:translateY(-8px);
}

.badge{
  display:inline-block;
  padding:5px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.fast{background:#dcfce7;color:#166534}
.normal{background:#dbeafe;color:#1d4ed8}

.card h3{margin:12px 0 6px}
.card p{color:var(--muted);font-size:14px}

button{
  margin-top:18px;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:12px;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="header">
  <h1>⚡ Available Charging Stations</h1>
  <div class="toggle" onclick="toggleTheme()">🌙 Theme</div>
</div>

<div class="container">
  <div class="grid">

    {% for s in stations %}
    <div class="card">
      <span class="badge {% if s.charger_type == 'Fast' %}fast{% else %}normal{% endif %}">
        {{ s.charger_type }} Charger
      </span>

      <h3>{{ s.name }}</h3>
      <p>📍 {{ s.city }}</p>

      <a href="{% url 'slot' s.id %}">
        <button>Book Slot</button>
      </a>
    </div>
    {% endfor %}

  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
